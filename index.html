<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Tax Planner</title>

    <link rel="apple-touch-icon" href="taxes.png">
    <link rel="icon" type="image/png" href="taxes.png">
    <meta name="apple-mobile-web-app-title" content="Tax Planner">
    
    <!-- Google Fonts: Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            -webkit-font-smoothing: antialiased;
        }
        
        input[type="text"], input[type="number"] {
            -webkit-appearance: none;
            appearance: none;
            font-size: 16px;
        }
        
        .glass-card {
            background: #ffffff;
            box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
        }

        .input-focus-effect {
            transition: all 0.2s ease;
        }
        .input-focus-effect:focus {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1);
            outline: none;
            border-color: #818cf8;
            background-color: white;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="selection:bg-indigo-100 selection:text-indigo-900 pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- Error Boundary ---
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-8 max-w-lg mx-auto mt-20 bg-white rounded-3xl shadow-xl text-center">
                            <div className="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                            </div>
                            <h2 className="text-xl font-semibold text-slate-800 mb-2">เกิดข้อผิดพลาดในการแสดงผล</h2>
                            <p className="text-slate-500 text-sm mb-6">{this.state.error?.toString()}</p>
                            <button onClick={() => window.location.reload()} className="bg-slate-800 text-white px-6 py-2.5 rounded-full font-medium hover:bg-slate-700 transition-colors">โหลดหน้าจอใหม่</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- Modern Icons ---
        const IconWallet = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>;
        const IconTarget = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconUsers = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconShield = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>;
        const IconCheck = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconHome = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
        const IconHeartHandshake = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path><path d="M12 5 9.04 7.96a2.17 2.17 0 0 0 0 3.08v0c.82.82 2.13.85 3 .07l2.07-1.9a2.82 2.82 0 0 1 3.79 0l2.96 2.66"></path><path d="m18 15-2-2"></path><path d="m15 18-2-2"></path></svg>;
        const IconSave = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const IconFolder = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"></path><path d="M2 10h20"></path></svg>;
        const IconTrash = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const IconWheelchair = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="6" r="2"></circle><path d="M8 20a6 6 0 0 1-6-6c0-2.8 2-5 4.5-5.5"></path><path d="M13 10h4"></path><path d="M10 11v6"></path><path d="M15 15v5h4"></path><path d="M10 6h4l3 9"></path></svg>;
        const IconAlertCircle = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const IconBadgeCheck = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg>;
        
        // --- Clean Components ---
        const CleanCard = ({ children, className = "" }) => (
            <div className={`glass-card rounded-[1.5rem] md:rounded-[2rem] p-6 md:p-8 ${className} fade-in`}>
                {children}
            </div>
        );

        const NumberInput = ({ label, value, onChange, maxNote, placeholder = "0", unit = "บาท", maxLength, maxValue, icon: IconComponent }) => {
            const handleChange = (e) => {
                let rawValue = e.target.value.replace(/[^0-9]/g, '');
                if (rawValue === '') { onChange(''); return; }
                let numValue = parseInt(rawValue, 10);
                if (maxValue !== undefined && numValue > maxValue) numValue = maxValue;
                onChange(numValue);
            };

            return (
                <div className="mb-6 w-full">
                    <label className="block text-[15px] font-semibold text-slate-700 mb-2 flex items-center">
                        {IconComponent && <IconComponent className="w-5 h-5 mr-2 text-indigo-500" />}
                        {label}
                    </label>
                    <div className="relative group">
                        <input
                            type="text" inputMode="numeric" maxLength={maxLength}
                            className={`w-full p-4 bg-slate-50/80 border border-slate-200 rounded-xl input-focus-effect transition-all text-right ${unit ? 'pr-16' : 'pr-4'} font-semibold text-slate-800 text-xl focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 focus:bg-white`}
                            value={value === '' ? '' : value.toLocaleString('en-US')}
                            onChange={handleChange} placeholder={placeholder}
                        />
                        {unit && <span className="absolute right-4 top-4.5 text-slate-400 font-medium text-base transition-colors group-focus-within:text-indigo-400" style={{marginTop: '3px'}}>{unit}</span>}
                    </div>
                    {maxNote && <p className="text-[13px] font-medium text-slate-500 mt-2.5 flex items-start leading-relaxed bg-white border border-slate-100 p-2.5 rounded-lg">
                        <span className="mr-2 mt-1 w-1.5 h-1.5 rounded-full bg-indigo-400 block flex-shrink-0"></span> 
                        {maxNote}
                    </p>}
                </div>
            );
        };

        const formatMoney = (val) => {
            if (isNaN(val) || val === undefined || val === null) return "0";
            return Math.round(val).toLocaleString('en-US');
        };

        const App = () => {
            const STORAGE_KEY = 'taxMastery_PND90_local';

            // Local Save States
            const [savedPlans, setSavedPlans] = useState([]);
            const [planName, setPlanName] = useState('');
            const [notification, setNotification] = useState('');
            
            // Modal States
            const [showClearConfirm, setShowClearConfirm] = useState(false);
            const [showMaxSavingDetails, setShowMaxSavingDetails] = useState(false);
            const [showBreakdown, setShowBreakdown] = useState(false);

            // Data States
            const [salary, setSalary] = useState('');
            const [bonus, setBonus] = useState('');
            
            const [otherIncome, setOtherIncome] = useState('');
            const [otherIncomeType, setOtherIncomeType] = useState('402'); // PND 90 Specific state
            
            const [withheldTax, setWithheldTax] = useState('');
            
            const [status, setStatus] = useState('single');
            const [children, setChildren] = useState(''); 
            const [children2018, setChildren2018] = useState(''); 
            const [parents, setParents] = useState(''); 
            const [parentsHealthInsurance, setParentsHealthInsurance] = useState(''); 
            const [disabledPersons, setDisabledPersons] = useState('');

            const [socialSecurity, setSocialSecurity] = useState('');
            const [lifeInsurance, setLifeInsurance] = useState('');
            const [healthInsurance, setHealthInsurance] = useState('');
            const [providentFund, setProvidentFund] = useState('');
            const [ssf, setSsf] = useState('');
            const [rmf, setRmf] = useState('');
            const [pensionInsurance, setPensionInsurance] = useState('');
            const [tesg, setTesg] = useState('');
            
            const [mortgageInterest, setMortgageInterest] = useState('');
            const [shoppingStimulus, setShoppingStimulus] = useState('');
            const [doubleDonations, setDoubleDonations] = useState('');
            const [donations, setDonations] = useState('');

            // --- Init Local Storage ---
            useEffect(() => {
                try {
                    const stored = localStorage.getItem(STORAGE_KEY);
                    if (stored) {
                        setSavedPlans(JSON.parse(stored));
                    }
                } catch (e) {
                    console.error("Failed to load plans from local storage", e);
                }
            }, []);

            // --- Notification Helper ---
            const showNotificationMsg = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(''), 3000);
            };

            // --- Save Logic (Local Storage) ---
            const getFormData = () => ({
                salary, bonus, otherIncome, otherIncomeType, withheldTax, status, children, children2018, 
                parents, parentsHealthInsurance, disabledPersons, socialSecurity, lifeInsurance, healthInsurance, 
                providentFund, ssf, rmf, pensionInsurance, tesg, mortgageInterest, 
                shoppingStimulus, doubleDonations, donations
            });

            const handleClearData = () => {
                setSalary(''); setBonus(''); setOtherIncome(''); setOtherIncomeType('402'); setWithheldTax('');
                setStatus('single'); setChildren(''); setChildren2018('');
                setParents(''); setParentsHealthInsurance(''); setDisabledPersons('');
                setSocialSecurity(''); setLifeInsurance(''); setHealthInsurance('');
                setProvidentFund(''); setSsf(''); setRmf(''); setPensionInsurance('');
                setTesg(''); setMortgageInterest(''); setShoppingStimulus('');
                setDoubleDonations(''); setDonations('');
                
                setShowMaxSavingDetails(false);
                setShowBreakdown(false);
                setShowClearConfirm(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
                showNotificationMsg("🧹 ล้างข้อมูลทั้งหมดเรียบร้อยแล้ว");
            };

            const handleSavePlan = (e) => {
                e.preventDefault();
                if (!planName.trim()) return showNotificationMsg("กรุณาตั้งชื่อแผนภาษี");

                try {
                    const newPlan = {
                        id: Date.now().toString(),
                        name: planName.trim(),
                        data: getFormData()
                    };
                    
                    const updatedPlans = [newPlan, ...savedPlans];
                    setSavedPlans(updatedPlans);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(updatedPlans));
                    
                    setPlanName('');
                    showNotificationMsg(`บันทึกแผน "${newPlan.name}" สำเร็จ`);
                } catch (error) {
                    showNotificationMsg("เกิดข้อผิดพลาดในการบันทึก");
                }
            };

            const loadPlan = (plan) => {
                const d = plan.data || {};
                setSalary(d.salary || ''); setBonus(d.bonus || ''); setOtherIncome(d.otherIncome || ''); setOtherIncomeType(d.otherIncomeType || '402'); setWithheldTax(d.withheldTax || '');
                setStatus(d.status || 'single'); setChildren(d.children || ''); setChildren2018(d.children2018 || '');
                setParents(d.parents || ''); setParentsHealthInsurance(d.parentsHealthInsurance || ''); setDisabledPersons(d.disabledPersons || '');
                setSocialSecurity(d.socialSecurity || ''); setLifeInsurance(d.lifeInsurance || ''); setHealthInsurance(d.healthInsurance || '');
                setProvidentFund(d.providentFund || ''); setSsf(d.ssf || ''); setRmf(d.rmf || ''); setPensionInsurance(d.pensionInsurance || '');
                setTesg(d.tesg || ''); setMortgageInterest(d.mortgageInterest || ''); setShoppingStimulus(d.shoppingStimulus || '');
                setDoubleDonations(d.doubleDonations || ''); setDonations(d.donations || '');
                
                showNotificationMsg(`โหลดแผน "${plan.name}" สำเร็จ`);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const deletePlan = (id, name) => {
                try {
                    const updatedPlans = savedPlans.filter(p => p.id !== id);
                    setSavedPlans(updatedPlans);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(updatedPlans));
                    showNotificationMsg(`ลบแผน "${name}" แล้ว`);
                } catch (error) {
                    console.error("Failed to delete plan", error);
                }
            };

            // --- Tax Calculation Engine (PND 90 Accurate) ---
            const calculateTaxForData = (data) => {
                const safeNum = (val) => Number(val) || 0;
                
                // 1. Income
                const salaryAnnual = safeNum(data.salary) * 12;
                const bonusValue = safeNum(data.bonus);
                const income401 = salaryAnnual + bonusValue;
                const otherIncomeValue = safeNum(data.otherIncome);
                const type = data.otherIncomeType || '402';
                
                const totalIncome = income401 + otherIncomeValue;
                
                // 2. Expenses (PND 90 vs 91 logic)
                let expenses = 0;
                let expenseBreakdownStr = "";
                
                if (type === '402') {
                    // 40(1) + 40(2) max 50%, capped at 100,000
                    expenses = Math.min((income401 + otherIncomeValue) * 0.5, 100000);
                    expenseBreakdownStr = "หักเหมา 50% ของรายได้ทั้งหมด (สูงสุดไม่เกิน 100,000 บาท)";
                } else if (type === '408') {
                    // 40(1) max 50% capped at 100,000
                    const exp401 = Math.min(income401 * 0.5, 100000);
                    // 40(8) commercial flat 60% (unlimited)
                    const exp408 = otherIncomeValue * 0.60;
                    expenses = exp401 + exp408;
                    expenseBreakdownStr = `เงินเดือนหักเหมา (${formatMoney(exp401)}) + ธุรกิจหักเหมา 60% (${formatMoney(exp408)})`;
                } else if (type === '405') {
                    const exp401 = Math.min(income401 * 0.5, 100000);
                    // 40(5) rental flat 30% (assuming property)
                    const exp405 = otherIncomeValue * 0.30;
                    expenses = exp401 + exp405;
                    expenseBreakdownStr = `เงินเดือนหักเหมา (${formatMoney(exp401)}) + ค่าเช่าหักเหมา 30% (${formatMoney(exp405)})`;
                }

                // 3. Allowances
                let personalAllowance = data.status === 'married_no_income' ? 120000 : 60000;
                let familyAllowance = (safeNum(data.children) * 30000) + (safeNum(data.children2018) * 60000) + 
                                      (Math.min(safeNum(data.parents), 4) * 30000) + Math.min(safeNum(data.parentsHealthInsurance), 15000) + 
                                      (safeNum(data.disabledPersons) * 60000);
                
                let socialSec = Math.min(safeNum(data.socialSecurity), 9000);
                let healthVal = Math.min(safeNum(data.healthInsurance), 25000);
                let genLifeUsed = Math.min(healthVal + safeNum(data.lifeInsurance), 100000);
                
                const pLimit = Math.min(totalIncome * 0.15, 200000);
                const actualPension = Math.min(safeNum(data.pensionInsurance), pLimit);
                let pensionExcess = safeNum(data.pensionInsurance) - actualPension;
                if (pensionExcess > 0 && genLifeUsed < 100000) {
                    genLifeUsed += Math.min(pensionExcess, 100000 - genLifeUsed);
                }
                
                const pvdActual = Math.min(safeNum(data.providentFund), totalIncome * 0.15, 500000);
                const ssfActual = Math.min(safeNum(data.ssf), totalIncome * 0.30, 200000);
                const rmfActual = Math.min(safeNum(data.rmf), totalIncome * 0.30, 500000);
                const retireGroup = Math.min(pvdActual + ssfActual + rmfActual + actualPension, 500000);
                
                const tesgActual = Math.min(safeNum(data.tesg), totalIncome * 0.30, 300000);
                
                let realEstateStimulus = Math.min(safeNum(data.mortgageInterest), 100000) + Math.min(safeNum(data.shoppingStimulus), 50000);

                const preDonAllowance = personalAllowance + familyAllowance + socialSec + genLifeUsed + retireGroup + tesgActual + realEstateStimulus;

                // 4. Donations
                let netForDon = Math.max(0, totalIncome - expenses - preDonAllowance);

                const doubleDon = Math.min(safeNum(data.doubleDonations) * 2, netForDon * 0.10);
                let netAfterDoubleDon = netForDon - doubleDon;
                const genDon = Math.min(safeNum(data.donations), netAfterDoubleDon * 0.10);
                const totalDonationAllowance = doubleDon + genDon;

                let netIncome = Math.max(0, netAfterDoubleDon - genDon);
                const totalAllowances = preDonAllowance + doubleDon + genDon;

                // 5. Brackets
                const brackets = [
                    { m: 0, r: 0 }, { m: 150000, r: 0.05 }, { m: 300000, r: 0.10 }, { m: 500000, r: 0.15 },
                    { m: 750000, r: 0.20 }, { m: 1000000, r: 0.25 }, { m: 2000000, r: 0.30 }, { m: 5000000, r: 0.35 }
                ];

                let tax = 0;
                let currentBracketIndex = 0;
                let bracketDetails = [];

                for (let i = 0; i < brackets.length; i++) {
                    const b = brackets[i];
                    const nextM = brackets[i+1] ? brackets[i+1].m : Infinity;
                    if (netIncome > b.m) {
                        const taxableInBracket = Math.min(netIncome - b.m, nextM - b.m);
                        const taxInBracket = taxableInBracket * b.r;
                        tax += taxInBracket;
                        if (taxInBracket > 0 || b.r === 0) currentBracketIndex = i;

                        if (taxableInBracket > 0) {
                            bracketDetails.push({
                                label: b.m === 0 ? '0 - 150,000 (ยกเว้น)' : `${formatMoney(b.m + 1)} - ${nextM === Infinity ? 'ขึ้นไป' : formatMoney(nextM)}`,
                                taxable: taxableInBracket,
                                tax: taxInBracket,
                                rate: b.r * 100
                            });
                        }
                    }
                }

                return { 
                    tax, totalIncome, totalAllowances, netIncome,
                    lifeAndHealthUsed: genLifeUsed, 
                    actualTesg: tesgActual,
                    retirementGroup: retireGroup, 
                    currentBracketRate: brackets[currentBracketIndex].r * 100,
                    currentBracketMin: brackets[currentBracketIndex].m,
                    totalDonationAllowance,
                    breakdown: { expenses, expenseBreakdownStr, personalAllowance, familyAllowance, socialSec, genLifeUsed, retireGroup, tesgActual, realEstateStimulus, doubleDon, genDon, bracketDetails, wht: safeNum(data.withheldTax) }
                };
            };

            const calculation = useMemo(() => {
                const safeNum = (val) => Number(val) || 0;
                const currentData = { salary, bonus, otherIncome, otherIncomeType, withheldTax, status, children, children2018, parents, parentsHealthInsurance, disabledPersons, socialSecurity, lifeInsurance, healthInsurance, providentFund, ssf, rmf, pensionInsurance, tesg, mortgageInterest, shoppingStimulus, doubleDonations, donations };
                
                const currentCalc = calculateTaxForData(currentData);
                
                // Max Scenario
                const totalIncome = currentCalc.totalIncome;
                const maxLifeAvailable = 100000 - currentCalc.lifeAndHealthUsed;
                
                const pvdActual = Math.min(safeNum(providentFund), totalIncome * 0.15, 500000);
                const pensionActual = Math.min(safeNum(pensionInsurance), totalIncome * 0.15, 200000);
                const groupUsedBeforeNewFunds = pvdActual + pensionActual;
                
                let remainingRetirementCapacity = Math.max(0, 500000 - groupUsedBeforeNewFunds - safeNum(ssf) - safeNum(rmf));
                const maxRmfByIncome = totalIncome * 0.30;
                remainingRetirementCapacity = Math.min(remainingRetirementCapacity, Math.max(0, maxRmfByIncome - safeNum(rmf)));

                const maxTesgCapacity = Math.min(totalIncome * 0.30, 300000);
                const remainingTesg = Math.max(0, maxTesgCapacity - currentCalc.actualTesg);

                const maxData = { ...currentData, 
                    lifeInsurance: safeNum(currentData.lifeInsurance) + maxLifeAvailable,
                    rmf: safeNum(currentData.rmf) + remainingRetirementCapacity,
                    tesg: safeNum(currentData.tesg) + remainingTesg
                };

                const maxCalc = calculateTaxForData(maxData);
                
                const maxPotentialTaxSavings = currentCalc.tax - maxCalc.tax;
                const lowestPossibleTax = maxCalc.tax;
                const investmentNeeded = maxLifeAvailable + remainingRetirementCapacity + remainingTesg;

                const paidWHT = safeNum(withheldTax);
                const taxDifference = currentCalc.tax - paidWHT;

                return {
                    ...currentCalc,
                    paidWHT, taxDifference: Math.abs(taxDifference), isRefund: taxDifference < 0,
                    lowestPossibleTax, maxPotentialTaxSavings, investmentNeeded,
                    caps: { life: maxLifeAvailable, retire: remainingRetirementCapacity, tesg: remainingTesg }
                };
            }, [salary, bonus, otherIncome, otherIncomeType, withheldTax, status, children, children2018, parents, parentsHealthInsurance, disabledPersons, socialSecurity, lifeInsurance, healthInsurance, providentFund, ssf, rmf, pensionInsurance, tesg, mortgageInterest, shoppingStimulus, doubleDonations, donations]);

                                <form onSubmit={handleSavePlan} className="flex flex-col sm:flex-row gap-3">
                                    <input type="text" value={planName} onChange={(e) => setPlanName(e.target.value)} placeholder="ตั้งชื่อแผนที่ต้องการบันทึก..." className="flex-1 p-3.5 bg-white border border-indigo-100 rounded-xl font-medium outline-none text-slate-700 focus:ring-2 focus:ring-indigo-300 transition-all shadow-sm" />
                                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3.5 rounded-xl font-medium flex items-center justify-center transition-all shadow-md shadow-indigo-200">
                                        บันทึกแผน
                                    </button>
                                </form>
                                {savedPlans.length > 0 && (
                                    <div className="mt-6 space-y-2.5">
                                        <p className="text-sm font-semibold text-slate-500 mb-3">แผนที่บันทึกไว้ ({savedPlans.length})</p>
                                        {savedPlans.map(plan => (
                                            <div key={plan.id} className="flex flex-col sm:flex-row sm:items-center justify-between bg-white/80 p-3.5 rounded-xl border border-indigo-50 hover:border-indigo-100 transition-all shadow-sm gap-3">
                                                <span className="font-semibold text-slate-700 text-[15px] flex items-center"><IconFolder className="w-4 h-4 text-indigo-400 mr-2.5 flex-shrink-0" /> <span className="truncate">{plan.name}</span></span>
                                                <div className="flex gap-2 self-end sm:self-auto">
                                                    <button onClick={() => loadPlan(plan)} className="text-sm bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg font-bold hover:bg-indigo-100 transition-colors shrink-0">เรียกดู</button>
                                                    <button onClick={() => deletePlan(plan.id, plan.name)} className="text-rose-400 hover:bg-rose-50 hover:text-rose-600 p-2 rounded-lg transition-colors shrink-0"><IconTrash className="w-5 h-5" /></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* RIGHT COLUMN: Premium Summary Panel */}
                        <div className="lg:col-span-5 space-y-6 lg:sticky top-24 z-30">
                            
                            {/* Hero Card */}
                            <div className={`rounded-[2rem] overflow-hidden shadow-2xl transition-all duration-700 ${calculation.isRefund ? 'bg-gradient-to-br from-emerald-500 to-teal-600' : (calculation.taxDifference > 0 ? 'bg-gradient-to-br from-rose-500 to-red-600' : 'bg-gradient-to-br from-slate-800 to-slate-900')}`}>
                                <div className="p-8 md:p-10 relative">
                                    <div className="absolute top-0 right-0 -mt-10 -mr-10 w-48 h-48 bg-white opacity-10 rounded-full blur-3xl"></div>
                                    <p className="font-semibold text-white/90 text-[15px] mb-3 flex items-center">
                                        {calculation.isRefund ? '🎉 ยินดีด้วย! จะได้เงินคืนภาษี' : (calculation.taxDifference > 0 ? '⚠️ ระวัง! คุณต้องจ่ายภาษีเพิ่ม' : 'ยอดภาษีสุทธิที่ต้องชำระ')}
                                    </p>
                                    <h2 className="text-5xl md:text-[4rem] font-bold tracking-tight text-white mb-3">
                                        {formatMoney(calculation.taxDifference)}
                                    </h2>
                                    {calculation.tax > 0 && (
                                        <div className="mt-5 inline-flex items-center bg-white/20 backdrop-blur-sm text-white px-5 py-2 rounded-full font-medium text-sm border border-white/20">
                                            ฐานภาษีสูงสุดของคุณอยู่ที่: <strong className="ml-1.5 text-base">{calculation.currentBracketRate}%</strong>
                                        </div>
                                    )}

                                    {/* Breakdown Button */}
                                    <button onClick={() => setShowBreakdown(true)} className="mt-6 inline-flex items-center justify-center w-full bg-white/10 hover:bg-white/20 backdrop-blur-md text-white px-5 py-3 rounded-2xl font-bold text-sm border border-white/10 transition-all shadow-sm">
                                        <svg className="w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                        ดูวิธีคำนวณอย่างละเอียด
                                    </button>
                                </div>
                            </div>

                            {/* Basic Breakdown */}
                            <CleanCard className="!p-7 space-y-4">
                                <h3 className="font-bold text-slate-800 text-lg border-b border-slate-100 pb-3 mb-4">สรุปที่มาของภาษี</h3>
                                <div className="flex justify-between items-center text-[15px]">
                                    <span className="text-slate-500">รายได้รวมทั้งปี</span>
                                    <span className="font-bold text-slate-800">{formatMoney(calculation.totalIncome)}</span>
                                </div>
                                <div className="flex justify-between items-center text-[15px]">
                                    <span className="text-slate-500">หัก ค่าลดหย่อนส่วนตัวและการลงทุน</span>
                                    <span className="font-bold text-rose-500">-{formatMoney(calculation.totalAllowances - calculation.totalDonationAllowance)}</span>
                                </div>
                                <div className="flex justify-between items-center text-[15px]">
                                    <span className="text-slate-500">หัก เงินบริจาค</span>
                                    <span className="font-bold text-rose-500">-{formatMoney(calculation.totalDonationAllowance)}</span>
                                </div>
                                <div className="flex justify-between items-center bg-indigo-50/50 p-5 rounded-2xl border border-indigo-100 mt-4">
                                    <div>
                                        <span className="font-bold text-indigo-900 block text-lg">เงินได้สุทธิ</span>
                                        <span className="text-xs text-indigo-600/70 font-medium">ยอดนี้นำไปคำนวณขั้นบันไดภาษี</span>
                                    </div>
                                    <span className="font-bold text-2xl text-indigo-700">{formatMoney(calculation.netIncome)}</span>
                                </div>
                                <div className="pt-6 mt-4 flex justify-between items-center text-[15px]">
                                    <span className="text-slate-500 font-medium">ภาษีที่คำนวณได้ตามกฎหมาย</span>
                                    <span className="font-bold text-slate-800 text-lg">{formatMoney(calculation.tax)}</span>
                                </div>
                                <div className="flex justify-between items-center text-[15px]">
                                    <span className="text-slate-500 font-medium">ภาษีที่บริษัทหักนำส่งไปแล้ว</span>
                                    <span className="font-bold text-blue-500 text-lg">-{formatMoney(calculation.paidWHT)}</span>
                                </div>
                            </CleanCard>

                            {/* Advanced: Max Savings Goal */}
                            <CleanCard className="!p-7 bg-emerald-50/30">
                                <div className="flex items-center mb-6">
                                    <div className="bg-emerald-100 p-2.5 rounded-xl text-emerald-600 mr-3.5"><IconTarget className="w-6 h-6" /></div>
                                    <div>
                                        <h3 className="font-bold text-slate-800 text-lg">เป้าหมายประหยัดภาษีสูงสุด</h3>
                                        <p className="text-[13px] text-slate-500 font-medium">จำลองแผนหากคุณซื้อลดหย่อนเต็มเพดาน</p>
                                    </div>
                                </div>
                                
                                <div className="bg-white p-5 rounded-2xl border border-emerald-100 shadow-sm">
                                    <p className="text-[14px] text-slate-500 mb-1 font-semibold">ภาษีต่ำสุดที่คุณทำได้ (Best Case)</p>
                                    <p className="text-[2.5rem] font-bold text-emerald-600 mb-5 leading-none mt-2">{formatMoney(calculation.lowestPossibleTax)} <span className="text-base text-emerald-600/70 font-medium ml-1">บาท</span></p>
                                    
                                    {calculation.tax > 0 && calculation.investmentNeeded > 0 ? (
                                        <>
                                            <div className="flex justify-between text-xs font-bold mb-2">
                                                <span className="text-slate-500">คุณสามารถประหยัดเงินภาษีได้อีก</span>
                                                <span className="text-emerald-500 text-sm">{formatMoney(calculation.maxPotentialTaxSavings)} บาท</span>
                                            </div>
                                            <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden flex mb-2">
                                                <div className="bg-emerald-400 h-full transition-all duration-1000" style={{ width: `${(calculation.lowestPossibleTax / calculation.tax) * 100}%` }}></div>
                                                <div className="bg-indigo-300 h-full transition-all duration-1000" style={{ width: `${(calculation.maxPotentialTaxSavings / calculation.tax) * 100}%` }}></div>
                                            </div>
                                            
                                            <button onClick={() => setShowMaxSavingDetails(!showMaxSavingDetails)} className="mt-5 w-full bg-slate-50 hover:bg-slate-100 border border-slate-200 py-3 rounded-xl text-sm font-bold text-slate-700 transition-colors">
                                                {showMaxSavingDetails ? 'ซ่อนรายละเอียดโควตา' : 'ดูโควตาการลงทุนที่สามารถซื้อเพิ่มได้'}
                                            </button>

                                            {showMaxSavingDetails && (
                                                <div className="mt-5 space-y-2 fade-in">
                                                    <p className="text-xs font-semibold text-slate-500 mb-3 text-center">สิทธิลดหย่อนที่ยังว่างอยู่</p>
                                                    {calculation.caps.life > 0 && (
                                                        <div className="bg-white border border-slate-100 p-3.5 rounded-xl flex justify-between items-center text-[15px] shadow-sm">
                                                            <span className="flex items-center text-slate-600 font-medium"><span className="w-2.5 h-2.5 rounded-full bg-blue-400 mr-3"></span>ประกันชีวิต/สุขภาพ</span>
                                                            <span className="font-bold text-slate-800">{formatMoney(calculation.caps.life)}</span>
                                                        </div>
                                                    )}
                                                    {calculation.caps.retire > 0 && (
                                                        <div className="bg-white border border-slate-100 p-3.5 rounded-xl flex justify-between items-center text-[15px] shadow-sm">
                                                            <span className="flex items-center text-slate-600 font-medium"><span className="w-2.5 h-2.5 rounded-full bg-teal-400 mr-3"></span>หมวดเกษียณ (RMF/SSF/PVD)</span>
                                                            <span className="font-bold text-slate-800">{formatMoney(calculation.caps.retire)}</span>
                                                        </div>
                                                    )}
                                                    {calculation.caps.tesg > 0 && (
                                                        <div className="bg-white border border-slate-100 p-3.5 rounded-xl flex justify-between items-center text-[15px] shadow-sm">
                                                            <span className="flex items-center text-slate-600 font-medium"><span className="w-2.5 h-2.5 rounded-full bg-orange-400 mr-3"></span>กองทุน Thai ESG</span>
                                                            <span className="font-bold text-slate-800">{formatMoney(calculation.caps.tesg)}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </>
                                    ) : (
                                        <div className="text-[15px] font-bold text-emerald-600 bg-emerald-50 p-4 rounded-xl text-center border border-emerald-100">
                                            ยอดเยี่ยมมาก! 👏 คุณบริหารภาษีได้ถึงจุดต่ำสุดแล้ว
                                        </div>
                                    )}
                                </div>
                            </CleanCard>

                        </div>
                    </div>

                    {/* Breakdown Modal */}
                    {showBreakdown && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[200] flex items-end sm:items-center justify-center sm:p-6 fade-in">
                            <div className="bg-white rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 md:p-8 w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl relative">
                                <button onClick={() => setShowBreakdown(false)} className="absolute top-6 right-6 p-2 bg-slate-100 text-slate-500 hover:bg-slate-200 rounded-full transition-colors">
                                    <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                </button>
                                
                                <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                                    <div className="bg-indigo-100 p-2 rounded-xl text-indigo-600 mr-3"><svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
                                    รายละเอียดการคำนวณ ภ.ง.ด.90/91
                                </h3>

                                <div className="space-y-4">
                                    {/* Step 1 & 2 */}
                                    <div className="bg-slate-50 rounded-2xl p-5 border border-slate-200">
                                        <div className="flex justify-between font-bold text-slate-800 mb-3">
                                            <span>1. เงินได้พึงประเมินทั้งหมด</span>
                                            <span>{formatMoney(calculation.totalIncome)}</span>
                                        </div>
                                        <div className="flex justify-between font-bold text-rose-500 text-[15px] mb-2">
                                            <span>2. หัก ค่าใช้จ่ายตามประเภทรายได้</span>
                                            <span>-{formatMoney(calculation.breakdown.expenses)}</span>
                                        </div>
                                        <div className="text-sm text-slate-500 ml-4 font-medium">
                                            ↳ {calculation.breakdown.expenseBreakdownStr}
                                        </div>
                                    </div>

                                    {/* Step 3: Allowances */}
                                    <div className="bg-slate-50 rounded-2xl p-5 border border-slate-200">
                                        <div className="font-bold text-slate-800 mb-4">3. หัก ค่าลดหย่อนต่างๆ</div>
                                        <div className="space-y-2 text-[15px] text-slate-600 ml-1 sm:ml-3">
                                            {calculation.breakdown.personalAllowance > 0 && <div className="flex justify-between"><span>- ลดหย่อนส่วนตัว/สมรส</span><span className="font-semibold text-rose-500">-{formatMoney(calculation.breakdown.personalAllowance)}</span></div>}
                                            {calculation.breakdown.familyAllowance > 0 && <div className="flex justify-between"><span>- บุตรและบิดามารดา</span><span className="font-semibold text-rose-500">-{formatMoney(calculation.breakdown.familyAllowance)}</span></div>}
                                            {calculation.breakdown.socialSec > 0 && <div className="flex justify-between"><span>- ประกันสังคม</span><span className="font-semibold text-rose-500">-{formatMoney(calculation.breakdown.socialSec)}</span></div>}
                                            {calculation.breakdown.genLifeUsed > 0 && <div className="flex justify-between"><span>- ประกันชีวิต/สุขภาพ</span><span className="font-semibold text-rose-500">-{formatMoney(calculation.breakdown.genLifeUsed)}</span></div>}
                                            {calculation.breakdown.retireGroup > 0 && <div className="flex justify-between"><span>- กลุ่มเกษียณ (PVD/SSF/RMF/บำนาญ)</span><span className="font-semibold text-rose-500">-{formatMoney(calculation.breakdown.retireGroup)}</span></div>}
                                            {calculation.breakdown.tesgActual > 0 && <div className="flex justify-between"><span>- กองทุน Thai ESG</span><span className="font-semibold text-rose-500">-{formatMoney(calculation.breakdown.tesgActual)}</span></div>}
                                            {calculation.breakdown.realEstateStimulus > 0 && <div className="flex justify-between"><span>- ดอกเบี้ยบ้าน / มาตรการรัฐ</span><span className="font-semibold text-rose-500">-{formatMoney(calculation.breakdown.realEstateStimulus)}</span></div>}
                                            {calculation.breakdown.doubleDon > 0 && <div className="flex justify-between"><span>- บริจาคการศึกษา/รพ. (x2)</span><span className="font-semibold text-rose-500">-{formatMoney(calculation.breakdown.doubleDon)}</span></div>}
                                            {calculation.breakdown.genDon > 0 && <div className="flex justify-between"><span>- บริจาคทั่วไป</span><span className="font-semibold text-rose-500">-{formatMoney(calculation.breakdown.genDon)}</span></div>}
                                        </div>
                                        <div className="flex justify-between font-bold text-slate-800 mt-5 pt-4 border-t border-slate-200 text-[15px]">
                                            <span>รวมค่าลดหย่อนทั้งหมด</span>
                                            <span className="text-rose-500">-{formatMoney(calculation.totalAllowances)}</span>
                                        </div>
                                    </div>

                                    {/* Step 4: Net Income */}
                                    <div className="bg-indigo-50 rounded-2xl p-5 border border-indigo-100 flex justify-between items-center">
                                        <span className="font-bold text-indigo-900 text-sm sm:text-base">4. เงินได้สุทธิ (เพื่อนำไปคำนวณภาษี)</span>
                                        <span className="font-black text-xl text-indigo-600">{formatMoney(calculation.netIncome)}</span>
                                    </div>

                                    {/* Step 5: Tax Bracket Table */}
                                    <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
                                        <div className="bg-slate-100 p-4 font-bold text-slate-800">5. คำนวณภาษีตามขั้นบันได</div>
                                        <div className="p-0 overflow-x-auto">
                                            <table className="w-full text-[14px] text-left text-slate-600 min-w-[400px]">
                                                <thead className="bg-slate-50 text-xs uppercase border-b border-slate-200">
                                                    <tr>
                                                        <th className="px-4 py-3 text-center w-24">อัตราภาษี</th>
                                                        <th className="px-4 py-3">ขั้นเงินได้สุทธิ (บาท)</th>
                                                        <th className="px-4 py-3 text-right">ภาษีในขั้น</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {calculation.breakdown.bracketDetails.length > 0 ? calculation.breakdown.bracketDetails.map((b, idx) => (
                                                        <tr key={idx} className="border-b border-slate-100 last:border-0 hover:bg-slate-50">
                                                            <td className="px-4 py-3 text-center font-bold text-slate-500">{b.rate}%</td>
                                                            <td className="px-4 py-3">{b.label}</td>
                                                            <td className={`px-4 py-3 text-right font-semibold ${b.rate > 0 ? 'text-rose-500' : 'text-emerald-500'}`}>{formatMoney(b.tax)}</td>
                                                        </tr>
                                                    )) : (
                                                        <tr><td colSpan="3" className="px-4 py-4 text-center text-slate-400">ไม่มีภาษีที่ต้องเสีย</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* Step 6: Final Calculation */}
                                    <div className="bg-slate-800 rounded-2xl p-5 shadow-lg space-y-3 mt-6">
                                        <div className="flex justify-between text-white/80 font-semibold text-[15px]">
                                            <span>ภาษีที่คำนวณได้รวมทั้งสิ้น</span>
                                            <span>{formatMoney(calculation.tax)}</span>
                                        </div>
                                        <div className="flex justify-between text-blue-300 font-semibold text-[15px] border-b border-white/10 pb-4">
                                            <span>หัก ภาษีที่บริษัทนำส่งแล้ว (ณ ที่จ่าย)</span>
                                            <span>-{formatMoney(calculation.breakdown.wht)}</span>
                                        </div>
                                        <div className="flex justify-between items-center text-white font-black text-xl pt-2">
                                            <span>{calculation.tax - calculation.breakdown.wht < 0 ? 'ได้เงินคืน' : 'ภาษีสุทธิที่ต้องชำระเพิ่ม'}</span>
                                            <span className={calculation.tax - calculation.breakdown.wht < 0 ? 'text-emerald-400 text-3xl' : 'text-yellow-400 text-3xl'}>{formatMoney(Math.abs(calculation.tax - calculation.breakdown.wht))}</span>
                                        </div>
                                    </div>
                                </div>
                                
                                <button onClick={() => setShowBreakdown(false)} className="mt-8 w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-bold text-lg transition-all shadow-lg">
                                    ปิดหน้าต่าง
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
